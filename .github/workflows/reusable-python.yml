name: Reusable Python Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        required: false
        type: string
        default: '3.11'
      install-system-deps:
        description: Install Linux system dependencies and unlock keyring
        required: false
        type: boolean
        default: true
      install-extras:
        description: Optional extras to install from pyproject (for example test,typing)
        required: false
        type: string
        default: ''
      extra-packages:
        description: Optional extra packages to install with uv pip
        required: false
        type: string
        default: ''
      run-tests:
        description: Run tests
        required: false
        type: boolean
        default: false
      test-command:
        description: Test command to run when run-tests=true
        required: false
        type: string
        default: 'pytest -q'
      run-mypy:
        description: Run mypy
        required: false
        type: boolean
        default: false
      mypy-target:
        description: Package/module path to type-check
        required: false
        type: string
        default: ''
      run-pre-commit:
        description: Run pre-commit
        required: false
        type: boolean
        default: false

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        if: inputs.install-system-deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-3 libdbus-1-dev libglib2.0-dev

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          python-version: ${{ inputs.python-version }}
          activate-environment: true

      - name: Install dependencies
        run: |
          uv pip install .
          if [[ -n "${{ inputs.install-extras }}" ]]; then
            uv pip install ".[${{ inputs.install-extras }}]"
          fi
          if [[ -n "${{ inputs.extra-packages }}" ]]; then
            uv pip install ${{ inputs.extra-packages }}
          fi

      - name: Unlock keyring
        if: inputs.install-system-deps
        uses: t1m0thyj/unlock-keyring@v1

      - name: Configure git to use https
        run: git config --global hub.protocol https

      - name: Run tests
        if: inputs.run-tests
        run: ${{ inputs.test-command }}

      - name: Run mypy
        if: inputs.run-mypy
        run: mypy ${{ inputs.mypy-target }}

      - name: Run pre-commit
        if: inputs.run-pre-commit
        run: pre-commit run --all-files
